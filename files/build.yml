name: Update profile banner

on:
  schedule:
    - cron: "30 23 * * *"   # ~05:00 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVGs
        run: python today.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git diff --quiet --cached || git commit -m "chore: update profile banner"
          git push
